<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow - Log Workout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Log Workout</h1>
            <p class="subtitle">Record today's session</p>
        </header>

        <form class="log-form">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>

            <label for="muscle">Muscle Group</label>
            <select id="muscle" name="muscle" required>
                <option value="">Select a muscle group</option>
                <option value="chest">Chest</option>
                <option value="back">Back</option>
                <option value="legs">Legs</option>
                <option value="shoulders">Shoulders</option>
                <option value="arms">Arms</option>
                <option value="core">Core</option>
            </select>

            <label for="exercises">Exercises</label>
            <textarea id="exercises" name="exercises" rows="3" placeholder="e.g. Bench press, Incline dumbbell press"></textarea>

            <label for="duration">Duration (minutes)</label>
            <input type="number" id="duration" name="duration" min="1" placeholder="45">

            <label for="notes">Notes (optional)</label>
            <textarea id="notes" name="notes" rows="2" placeholder="How did it feel?"></textarea>

            <button type="submit" class="log-btn">Save Workout</button>
        </form>
    </div>
</body>
</html>
