<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Welcome, Yugesh 👋</h1>
            <p class="subtitle">Here's your week at a glance</p>
        </header>

        <section class="suggestion-card">
            <p class="suggestion-label">Today's Suggestion</p>
            <h2>Legs 🦵</h2>
            <p class="suggestion-reason">Not trained in 5 days</p>
        </section>

        <section class="weekly-progress">
            <h3>This Week</h3>
            <div class="progress-grid">
    <div class="day-box" id="box-mon">
        <span>Mon</span>
        <span class="muscle" id="muscle-mon">—</span>
    </div>
    <div class="day-box" id="box-tue">
        <span>Tue</span>
        <span class="muscle" id="muscle-tue">—</span>
    </div>
    <div class="day-box" id="box-wed">
        <span>Wed</span>
        <span class="muscle" id="muscle-wed">—</span>
    </div>
    <div class="day-box" id="box-thu">
        <span>Thu</span>
        <span class="muscle" id="muscle-thu">—</span>
    </div>
    <div class="day-box" id="box-fri">
        <span>Fri</span>
        <span class="muscle" id="muscle-fri">—</span>
    </div>
    <div class="day-box" id="box-sat">
        <span>Sat</span>
        <span class="muscle" id="muscle-sat">—</span>
    </div>
    <div class="day-box" id="box-sun">
        <span>Sun</span>
        <span class="muscle" id="muscle-sun">—</span>
    </div>
    <div class="modal-overlay" id="day-modal">
    <div class="modal-box">
        <div class="modal-header">
            <h2 id="modal-day-title">Monday</h2>
            <button class="modal-close" id="modal-close-btn">&times;</button>
        </div>
        <ul class="modal-exercise-list" id="modal-exercise-list">
        </ul>
    </div>
</div>
</div>
        </section>

        
        <a href="log-workout.html" class="log-btn">+ Log Workout</a>
        <a href="history.html" class="history-link">View Full History →</a>
    </div>
    </div>
    <script src="script.js"></script>
    </body>
</html>
