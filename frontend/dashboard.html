<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Welcome, Yugesh 👋</h1>
            <p class="subtitle">Here's your week at a glance</p>
        </header>

        <section class="suggestion-card">
            <p class="suggestion-label">Today's Suggestion</p>
            <h2>Legs 🦵</h2>
            <p class="suggestion-reason">Not trained in 5 days</p>
        </section>

        <section class="weekly-progress">
            <h3>This Week</h3>
            <div class="progress-grid">
                <div class="day-box done">
                    <span>Mon</span>
                    <span class="muscle">Chest</span>
                </div>
                <div class="day-box done">
                    <span>Tue</span>
                    <span class="muscle">Back</span>
                </div>
                <div class="day-box">
                    <span>Wed</span>
                    <span class="muscle">—</span>
                </div>
                <div class="day-box">
                    <span>Thu</span>
                    <span class="muscle">—</span>
                </div>
                <div class="day-box">
                    <span>Fri</span>
                    <span class="muscle">—</span>
                </div>
                <div class="day-box">
                    <span>Sat</span>
                    <span class="muscle">—</span>
                </div>
                <div class="day-box">
                    <span>Sun</span>
                    <span class="muscle">—</span>
                </div>
            </div>
        </section>

        <button class="log-btn">+ Log Workout</button>
    </div>
</body>
</html>
